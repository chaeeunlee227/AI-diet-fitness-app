<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF7D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E8A52;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAF7EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4F0E0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:#4CAF7D;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4CAF7D;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2E9E5B" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="316" height="96" rx="20" ry="20" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="316" height="96" rx="20" ry="20" fill="none" stroke="#A8DDBF" stroke-width="1.5"/>

  <!-- Emoji circle -->
  <circle cx="54" cy="50" r="34" fill="white" filter="url(#shadow)"/>
  <circle cx="54" cy="50" r="34" fill="none" stroke="#B6DFC8" stroke-width="1.2"/>

  <!-- Salad bowl -->
  <ellipse cx="54" cy="62" rx="20" ry="7" fill="#8B6914"/>
  <path d="M34 55 Q34 70 54 70 Q74 70 74 55 Z" fill="#A07820"/>
  <ellipse cx="54" cy="50" rx="19" ry="10" fill="#5CB85C"/>
  <circle cx="46" cy="48" r="5" fill="#E74C3C"/>
  <rect x="45" y="42" width="2" height="3" rx="1" fill="#27AE60"/>
  <ellipse cx="60" cy="50" rx="5" ry="3.5" fill="#7EC850" transform="rotate(-20,60,50)"/>
  <ellipse cx="60" cy="50" rx="3" ry="2" fill="#A8D86E" transform="rotate(-20,60,50)"/>
  <ellipse cx="52" cy="53" rx="8" ry="4" fill="#4CAF50" transform="rotate(15,52,53)"/>
  <ellipse cx="58" cy="44" rx="6" ry="3" fill="#66BB6A" transform="rotate(-10,58,44)"/>
  <circle cx="50" cy="45" r="3" fill="#FF8C00"/>

  <!-- Single text element: "Healt" dark green + "HI" bright green, no gap -->
  <text x="98" y="62"
    font-family="'Nunito', 'Arial Rounded MT Bold', Helvetica, sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="-0.5">
    <tspan fill="#1B5E35">Healt</tspan><tspan fill="#2E9E5B">HI</tspan>
  </text>

  <!-- AI badge -->
  <rect x="248" y="20" width="28" height="16" rx="8" fill="url(#iconGrad)"/>
  <text x="262" y="32"
    font-family="'Nunito', Helvetica, sans-serif"
    font-size="9"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="1">AI</text>

  <!-- Tagline -->
  <text x="99" y="80"
    font-family="'Nunito', Helvetica, sans-serif"
    font-size="10"
    font-weight="700"
    fill="#5A9E78"
    letter-spacing="2.5">YOUR AI HEALTH COMPANION</text>
</svg>